<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop stop-color="#1a2238"/>
      <stop offset="1" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop stop-color="#fde68a"/>
      <stop offset="0.5" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop stop-color="#d97706"/>
      <stop offset="1" stop-color="#7c2d12"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Centered trophy (visual center at 256, 256) -->
  <g transform="translate(256 212)" stroke="#5a1a0a" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <!-- Left handle -->
    <path fill="url(#gold)" d="M-100 -65 C-160 -65 -178 -10 -140 45 L-95 25 C-120 -5 -120 -40 -100 -52 Z"/>
    <!-- Right handle -->
    <path fill="url(#gold)" d="M100 -65 C160 -65 178 -10 140 45 L95 25 C120 -5 120 -40 100 -52 Z"/>
    <!-- Cup bowl -->
    <path fill="url(#gold)" d="M-100 -100 H100 L90 0 C90 55 55 90 0 90 C-55 90 -90 55 -90 0 Z"/>
    <!-- Rim highlight -->
    <path fill="#fffbeb" fill-opacity="0.5" stroke="none" d="M-94 -100 H94 V-82 H-94 Z"/>
    <!-- Star inside cup -->
    <path fill="#fffbeb" stroke="none" d="M0 -60 L10 -34 L38 -34 L16 -18 L24 8 L0 -8 L-24 8 L-16 -18 L-38 -34 L-10 -34 Z"/>
    <!-- Stem -->
    <rect x="-28" y="90" width="56" height="42" rx="8" fill="url(#goldDark)"/>
    <!-- Base top -->
    <rect x="-72" y="132" width="144" height="24" rx="10" fill="url(#gold)"/>
    <!-- Base bottom -->
    <rect x="-94" y="156" width="188" height="32" rx="12" fill="url(#goldDark)"/>
  </g>
</svg>
