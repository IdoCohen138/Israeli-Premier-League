name: Bet deadline email reminders

on:
  schedule:
    # Every 15 minutes (UTC)
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no emails sent)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      diagnose_only:
        description: 'Only print diagnostic info'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: bet-deadline-email-reminders
  cancel-in-progress: false

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log trigger info
        run: |
          echo "event=${{ github.event_name }}"
          echo "diagnose_only=${{ inputs.diagnose_only }}"
          echo "dry_run=${{ inputs.dry_run }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: scripts/email-reminders/package-lock.json

      - name: Install dependencies
        working-directory: scripts/email-reminders
        run: npm ci

      - name: Diagnose (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.diagnose_only == 'true'
        working-directory: scripts/email-reminders
        run: node diagnose.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          APP_URL: ${{ vars.APP_URL }}

      - name: Send bet deadline reminders
        if: github.event_name == 'schedule' || inputs.diagnose_only != 'true'
        working-directory: scripts/email-reminders
        run: node run.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          APP_URL: ${{ vars.APP_URL }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}

      - name: Diagnose after run (on failure)
        if: failure() && (github.event_name == 'schedule' || inputs.diagnose_only != 'true')
        working-directory: scripts/email-reminders
        run: node diagnose.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          APP_URL: ${{ vars.APP_URL }}
