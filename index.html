<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0c1221" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ניחושים ליגת העל" />
    <script>
      (function () {
        var theme = localStorage.getItem('ipl-theme') || 'dark';
        document.documentElement.classList.add(theme);
        var themeColor = theme === 'light' ? '#f4f6f8' : '#0c1221';
        document.querySelector('meta[name="theme-color"]').setAttribute('content', themeColor);
      })();
    </script>
    <style>
      html { background-color: #0c1221; }
      html.light { background-color: #f4f6f8; }
      .home-hero-kicker { color: #b45309; letter-spacing: 0.2em; font-weight: 700; font-size: 11px; text-transform: uppercase; }
      html.dark .home-hero-kicker { color: #fbbf24; }
      .home-hero-emblem svg { color: #d97706; }
      html.dark .home-hero-emblem svg { color: #fbbf24; }
    </style>
    <meta name="description" content="ניחושים ליגת העל - הימורים מקדימים, הימורי מחזור וטבלת מיקומים" />
    <title>ניחושים ליגת העל</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
